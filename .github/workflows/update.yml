name: Update Pharmacies

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Installer et lancer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          npm install node-fetch@2 cheerio @supabase/supabase-js
          node -e "
          const fetch = require('node-fetch');
          const cheerio = require('cheerio');
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);

          async function main() {
            console.log('Recherche article pharmacies...');
            try {
              // Trouver le lien de l article de la semaine
              const homeRes = await fetch('https://www.lacinquieme.tg', { headers: { 'User-Agent': 'Mozilla/5.0' } });
              const homeHtml = await homeRes.text();
              const home = cheerio.load(homeHtml);
              
              let articleUrl = '';
              home('a').each((i, el) => {
                const href = home(el).attr('href') || '';
                if (href.includes('pharmacies-de-garde') && !articleUrl) {
                  articleUrl = href;
                }
              });

              if (!articleUrl) {
                console.log('Lien article non trouve');
                return;
              }

              console.log('Article trouve:', articleUrl);

              const res = await fetch(articleUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } });
              const html = await res.text();
              const dollar = cheerio.load(html);
              const pharmacies = [];

              let villeActuelle = 'Lome';
              let zoneActuelle = 'A';

              dollar('.entry-content h2, .entry-content h3, .entry-content li').each((i, el) => {
                const tag = el.tagName.toLowerCase();
                const texte = dollar(el).text().trim();

                // Detecter ville depuis h2
                if (tag === 'h2') {
                  const t = texte.toLowerCase();
                  if (t.includes('dapaong')) villeActuelle = 'Dapaong';
                  else if (t.includes('kara')) villeActuelle = 'Kara';
                  else if (t.includes('kpalim')) villeActuelle = 'Kpalime';
                  else if (t.includes('sokod')) villeActuelle = 'Sokode';
                  else if (t.includes('tsev')) villeActuelle = 'Tsevie';
                  else if (t.includes('atakpam')) villeActuelle = 'Atakpame';
                  else if (t.includes('lom') || t.includes('interieur') === false) villeActuelle = 'Lome';
                  console.log('Ville detectee:', villeActuelle);
                }

                // Detecter zone depuis h3
                if (tag === 'h3') {
                  if (texte.includes('Zone A')) zoneActuelle = 'A';
                  else if (texte.includes('Zone B')) zoneActuelle = 'B';
                  else if (texte.includes('Zone C')) zoneActuelle = 'C';
                  else if (texte.includes('Zone D')) zoneActuelle = 'D';
                  else if (texte.includes('Zone E')) zoneActuelle = 'E';
                  else if (texte.match(/Zone [F-L]/)) zoneActuelle = 'F';
                  else zoneActuelle = 'A';
                }

                // Detecter pharmacie depuis li
                if (tag === 'li') {
                  const nom = dollar(el).find('strong').first().text().trim();
                  const tel = dollar(el).find('a[href^=\"tel:\"]').attr('href')?.replace('tel:', '') ||
                              texte.match(/\+228\d+/)?.[0] || '';
                  const lignes = texte.split('\n').map(l => l.trim()).filter(l => l);
                  const adresse = lignes.slice(1).join(' ').replace(nom, '').trim().substring(0, 200);
                  const assurances = [];
                  if (texte.includes('INAM')) assurances.push('INAM');
                  if (texte.includes('CNSS')) assurances.push('CNSS');
                  if (texte.includes('AMU')) assurances.push('AMU');
                  if (texte.includes('GTA')) assurances.push('GTA');
                  if (texte.includes('SANLAM')) assurances.push('SANLAM');
                  if (texte.includes('SUNU')) assurances.push('SUNU');

                  if (nom && nom.toLowerCase().includes('pharmac')) {
                    // Corriger accents
                    let villeFinale = villeActuelle;
                    if (villeActuelle === 'Kpalime') villeFinale = 'Kpalime';
                    if (villeActuelle === 'Sokode') villeFinale = 'Sokode';
                    if (villeActuelle === 'Tsevie') villeFinale = 'Tsevie';
                    if (villeActuelle === 'Atakpame') villeFinale = 'Atakpame';

                    pharmacies.push({
                      nom: nom.substring(0, 100),
                      adresse: adresse,
                      tel: tel.substring(0, 20),
                      tel_affiche: tel.substring(0, 20),
                      ville: villeFinale,
                      zone: zoneActuelle,
                      garde: 'soir',
                      heures: 'Toute la semaine',
                      assurances: assurances.join(','),
                      actif: true
                    });
                  }
                }
              });

              console.log(pharmacies.length + ' pharmacies trouvees');
              
              // Afficher résumé par ville
              const parVille = {};
              pharmacies.forEach(p => { parVille[p.ville] = (parVille[p.ville] || 0) + 1; });
              console.log('Résumé:', JSON.stringify(parVille));

              if (pharmacies.length > 0) {
                await supabase.from('pharmacies').delete().neq('id', 0);
                const { error } = await supabase.from('pharmacies').insert(pharmacies);
                if (error) console.error('Erreur insertion:', JSON.stringify(error));
                else console.log('Mise a jour reussie! ' + pharmacies.length + ' pharmacies inserees');
              } else {
                console.log('0 pharmacies - donnees conservees');
              }
            } catch(e) {
              console.error('Erreur:', e.message);
            }
          }
          main();
          "

name: Mise à jour pharmacies de garde

on:
  schedule:
    - cron: '0 5 * * 1'  # Chaque lundi à 5h UTC (6h Togo)
  workflow_dispatch:       # Permet aussi de lancer manuellement

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installer les dépendances
        run: npm install node-fetch cheerio @supabase/supabase-js

      - name: Lancer le script de mise à jour
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/update-pharmacies.js

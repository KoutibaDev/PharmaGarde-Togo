name: Mise à jour pharmacies de garde

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installer dependances
        run: npm install

      - name: Debug fichiers
        run: |
          pwd
          ls -la
          ls -la scripts/
          cat scripts/update-pharmacies.js

      - name: Lancer script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/update-pharmacies.js

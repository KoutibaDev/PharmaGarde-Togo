name: Mise à jour pharmacies de garde

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install node-fetch@2 cheerio @supabase/supabase-js

      - run: node scripts/update-pharmacies.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
